name: 📝 Documentation
description: Suggest improvements to documentation
title: "[Docs]: "
labels: ["documentation", "needs triage"]
assignees:
  - Aditya-Bichave
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve our documentation!

  - type: textarea
    id: current
    attributes:
      label: What documentation needs improvement?
      description: Describe the current state and what's missing or unclear.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvements
      description: What changes would you suggest?
    validations:
      required: true

  - type: input
    id: file
    attributes:
      label: Affected files
      description: Which documentation files are affected?
      placeholder: e.g., README.md, docs/DEVELOPMENT.md
