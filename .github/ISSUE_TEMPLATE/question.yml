name: 🙋 Question
description: Ask a question about the project
title: "[Question]: "
labels: ["question", "needs triage"]
assignees:
  - cosmic-fi
body:
  - type: markdown
    attributes:
      value: |
        Have a question? We're here to help!

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: Ask your question in detail.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any additional context that might help us answer your question.
